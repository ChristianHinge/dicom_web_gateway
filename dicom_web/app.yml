command: 
  - "hypercorn"
  - "app:app"
env:
  # ── Required ────────────────────────────────────────────────────────────────
  - name: "DICOMWEB_GATEWAY_URL"
    value: "https://pixels-dicomweb-gateway-7405613569486293.13.azure.databricksapps.com"
  - name: "DATABRICKS_WAREHOUSE_ID"
    valueFrom: "sql_warehouse"
  - name: "DATABRICKS_PIXELS_TABLE"
    value: "dap_project_3897cc.pixels.dicom_metadata"

  # ── Authentication ──────────────────────────────────────────────────────────
  - name: "DICOMWEB_USE_USER_AUTH"
    value: "false"

  # ── HTTP client tuning ──────────────────────────────────────────────────────
  - name: "DICOMWEB_MAX_CONNECTIONS"
    value: "200"
  - name: "DICOMWEB_MAX_KEEPALIVE"
    value: "100"

  # ── Logging ─────────────────────────────────────────────────────────────────
  - name: "DB_PIXELS_LOG_LEVEL"
    value: "INFO"
